<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REGISTER</title> 
</head>
<body>

<h2>REGISTRATE</h2>

<form action="#" method="post">

    <label for="nombreUser">Nombres</label>
    <input type="text" name="nombreUser" id="nombreUser" placeholder="Ingresa tus nombres" size="15">

    <br><br>

    <label for="apellidosUser">Apellidos</label>
    <input type="text" name="apellidosUser" id="apellidosUser" placeholder="Ingresa tus apellidos" size="15">

    <br><br>

    <label for="fechaNac">Fecha de nacimiento</label>
    <input type="date" name="fechaNac" id="fechaNac">

    <br><br>

    <label for="genero">Genero</label>
    <select name="genero" id="genero"
    required>
        <option value="" selected disabled> Seleccione genero</option>
        <option value="1">Femenino</option> 
        <option value="2">Masculino</option>   

    </select>

    <br><br>

    <label for="usuario">Usuario:</label>
    <input type="text" name="usuario" id="usuario" placeholder="Ingrese correo electrónico" size="25">

    <br><br>

    <label for="contraseña">Contraseña:</label>
    <input type="password" name="contraseña" id="contraseña" placeholder="contraseña" size="15">

    <br><br>


    <a href="pag_venta_juego.html">
        <button type="submit">Registrar</button>
    </a>

    <button type="reset">Limpiar</button>

</form>

</body>
</html>
